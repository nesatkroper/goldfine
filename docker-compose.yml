version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goldfine-app
    restart: unless-stopped
    ports:
      - "8081:80"
    env_file:
      - .env
    volumes:
      - .:/var/www
      - app-storage:/var/www/storage
      - app-bootstrap:/var/www/bootstrap/cache
      - app-uploads:/var/www/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - goldfine-network

  db:
    image: mysql:5.7
    container_name: goldfine-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: amulet_db
      MYSQL_ROOT_PASSWORD: Aa32c2PFMzcwDd2r
      MYSQL_USER: amulet_db
      MYSQL_PASSWORD: Aa32c2PFMzcwDd2r
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-uroot",
          "-pAa32c2PFMzcwDd2r",
          "--silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - goldfine-network

networks:
  goldfine-network:
    driver: bridge

volumes:
  db-data:
  app-storage:
  app-bootstrap:
  app-uploads:
