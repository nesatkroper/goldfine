<VirtualHost *:80>
    ServerName goldfine.cleartoo.site
    ServerAlias www.goldfine.cleartoo.site
    DocumentRoot /var/www/public

    <Directory /var/www/public>
        AllowOverride All
        Order Allow,Deny
        Allow from all
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
